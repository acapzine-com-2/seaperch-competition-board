<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Scoring</title>

    <style>
      :root {
        --bg: #f4f6f8;
        --surface: #ffffff;
        --surface-2: #f9fafb;
        --text: #18212b;
        --muted: #5b6773;
        --border: #d8dee6;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        --radius: 14px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        font-size: 16px;
      }

      body {
        margin: 0;
        padding: 16px;
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          "Open Sans",
          "Helvetica Neue",
          sans-serif;
        line-height: 1.45;
      }

      #broadcast {
        margin: 0 auto 12px;
        width: min(1100px, 100%);
      }

      h1 {
        width: min(1100px, 100%);
        margin: 20px auto 10px;
        font-size: 1.35rem;
        line-height: 1.2;
        letter-spacing: -0.02em;
      }

      table {
        width: min(1100px, 100%);
        margin: 0 auto 18px;
        border-collapse: separate;
        border-spacing: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      thead {
        background: var(--surface-2);
      }

      thead th {
        padding: 14px 12px;
        text-align: left;
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--text);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }

      tbody td {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
        font-size: 0.96rem;
      }

      tbody tr:last-child td {
        border-bottom: none;
      }

      tbody tr:nth-child(even) {
        background: #fcfdff;
      }

      tbody tr:hover {
        background: #f2f7ff;
      }

      @media (max-width: 700px) {
        body {
          padding: 12px;
        }

        h1 {
          font-size: 1.15rem;
          margin: 16px auto 8px;
        }

        table {
          display: block;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          border-radius: 12px;
        }

        thead th,
        tbody td {
          padding: 10px 10px;
          font-size: 0.92rem;
        }
      }

      @media (max-width: 420px) {
        body {
          padding: 10px;
        }

        h1 {
          font-size: 1.05rem;
        }

        thead th,
        tbody td {
          padding: 9px 8px;
          font-size: 0.88rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="broadcast"></div>
    <h1>Obstacle Course Scoring</h1>
    <table id="obstacle-scoring">
      <thead>
        <tr>
          <th>Team Name</th>
          <th>Division</th>
          <th>Obstacle Minutes</th>
          <th>Obstacle Seconds</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <h1>Mission Course Scoring</h1>
    <table id="mission-scoring">
      <thead>
        <tr>
          <th>Team Name</th>
          <th>Division</th>
          <th>Mission Minutes</th>
          <th>Mission Seconds</th>
          <th>Mission Total</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      const mcs = document
        .getElementById("mission-scoring")
        .querySelector("tbody");
      const ocs = document
        .getElementById("obstacle-scoring")
        .querySelector("tbody");

      document.addEventListener("DOMContentLoaded", () => {
        const socket = new WebSocket("/");

        let data;

        function refreshTables() {
          if (!data.obstacle_course || !data.mission) return;
          else if (
            !Array.isArray(data.obstacle_course) ||
            !Array.isArray(data.mission)
          )
            return;

          /** @type {any[]} */
          const ob = data.obstacle_course;
          /** @type {any[]} */
          const mi = data.mission;

          while (mcs.firstChild) {
            mcs.removeChild(mcs.firstChild);
          }
          while (ocs.firstChild) {
            ocs.removeChild(ocs.firstChild);
          }

          for (const entry of data.mission) {
            const { name, division, minutes, seconds, score_final } = entry;
            const row = document.createElement("tr");

            const nameElem = document.createElement("td");
            const divElem = document.createElement("td");
            const minElem = document.createElement("td");
            const secElem = document.createElement("td");
            const scoreElem = document.createElement("td");

            nameElem.textContent = name;
            divElem.textContent = division;
            minElem.textContent = minutes;
            secElem.textContent = seconds;
            scoreElem.textContent = score_final;

            row.append(nameElem, divElem, minElem, secElem, scoreElem);
            mcs.appendChild(row);
          }
          for (const entry of data.obstacle_course) {
            const { name, division, minutes, seconds } = entry;

            const row = document.createElement("tr");

            const nameElem = document.createElement("td");
            const divElem = document.createElement("td");
            const minElem = document.createElement("td");
            const secElem = document.createElement("td");

            nameElem.textContent = name;
            divElem.textContent = division;
            minElem.textContent = minutes;
            secElem.textContent = seconds;
            row.append(nameElem, divElem, minElem, secElem);
            ocs.appendChild(row);
          }
        }

        socket.onopen = () => console.log("Connection to WS established.");
        socket.onclose = () => console.warn("WS is closed");
        socket.onerror = (e) => console.error(e);
        socket.onmessage = (msg) => {
          const obj = JSON.parse(msg.data);
          if (obj.code === 1) data = JSON.parse(obj.data);
          else console.error(JSON.stringify(obj, null, 2));

          refreshTables();
          if (window.restartAutoScroll) {
            window.restartAutoScroll();
          }
        };
      });
    </script>
    <script>
      (() => {
        const SPEED = 0.6;
        const PAUSE_MS = 1500;

        let animationId = null;
        let pauseUntil = 0;
        let direction = 1;
        let running = false;
        let scrollPos = 0;

        function getMaxScroll() {
          return Math.max(
            0,
            document.documentElement.scrollHeight - window.innerHeight,
          );
        }

        function stopAutoScroll() {
          if (animationId !== null) {
            cancelAnimationFrame(animationId);
            animationId = null;
          }
          running = false;
        }

        function tick(now) {
          const maxScroll = getMaxScroll();

          if (maxScroll <= 0) {
            stopAutoScroll();
            return;
          }

          if (now < pauseUntil) {
            animationId = requestAnimationFrame(tick);
            return;
          }

          scrollPos += SPEED * direction;

          if (scrollPos >= maxScroll) {
            scrollPos = maxScroll;
            direction = -1;
            pauseUntil = now + PAUSE_MS;
          } else if (scrollPos <= 0) {
            scrollPos = 0;
            direction = 1;
            pauseUntil = now + PAUSE_MS;
          }

          window.scrollTo(0, Math.round(scrollPos));
          animationId = requestAnimationFrame(tick);
        }

        function startAutoScroll() {
          if (running) return;
          if (getMaxScroll() <= 0) return;

          running = true;
          animationId = requestAnimationFrame(tick);
        }

        function restartAutoScroll() {
          stopAutoScroll();

          const maxScroll = getMaxScroll();
          if (maxScroll <= 0) return;

          direction = 1;
          scrollPos = 0;
          pauseUntil = performance.now() + 500;
          window.scrollTo(0, 0);

          startAutoScroll();
        }

        window.addEventListener("load", restartAutoScroll);
        window.addEventListener("resize", restartAutoScroll);

        document.addEventListener("DOMContentLoaded", () => {
          const observer = new MutationObserver(() => {
            restartAutoScroll();
          });

          observer.observe(document.body, {
            childList: true,
            subtree: true,
            characterData: true,
          });

          restartAutoScroll();
        });

        window.restartAutoScroll = restartAutoScroll;
      })();
    </script>
  </body>
</html>
